name: Control Push

on: push

jobs:
  qa:
    name: Check tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pytest and flake8
        run: |
          pip install pytest flake8

      - name: Run tests
        run: |
          pytest

      - name: Run flake8
        run: |
          flake8 .
